name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip \
            libffi-dev libssl-dev build-essential zlib1g-dev \
            autoconf libtool libltdl-dev pkg-config
          pip install buildozer==1.5.0 cython
      - name: Build
        run: |
          cp classroom_groups-6.py main.py 2>/dev/null || cp classroom_groups*.py main.py
          printf '[app]\ntitle = Keep Moving\npackage.name = keepmoving\npackage.domain = org.classroom\nsource.dir = .\nsource.include_exts = py\nversion = 1.0\nrequirements = python3,kivy==2.2.1\norientation = portrait\nandroid.permissions = INTERNET,VIBRATE,ACCESS_WIFI_STATE\nandroid.minapi = 21\nandroid.api = 33\nandroid.ndk = 25b\nandroid.accept_sdk_license = True\n[buildozer]\nlog_level = 2\n' > buildozer.spec
          yes | buildozer android debug 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: KeepMoving-APK
          path: bin/*.apk
